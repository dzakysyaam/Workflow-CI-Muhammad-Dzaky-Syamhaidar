name: MLflow CI Advanced

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check environment
        run: |
          python --version
          pip --version
          docker --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 matplotlib seaborn

      - name: Clean old MLflow artifacts
        run: |
          rm -rf MLProject/mlruns
          rm -rf MLProject/mlartifacts
          rm -rf docker_model
          rm -f MLProject/run_id.txt
          rm -f MLProject/metric_info.json
          rm -f MLProject/training_confusion_matrix.png

      - name: Run MLflow Project
        run: |
          cd MLProject
          MLFLOW_TRACKING_URI=file:./mlruns mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        run: |
          echo "RUN_ID=$(cat MLProject/run_id.txt)" >> $GITHUB_ENV
          echo "Run ID: $(cat MLProject/run_id.txt)"

      - name: Prepare Docker model artifact
        run: |
          MODEL_DIR=$(find MLProject/mlruns -type d -path "*/${{ env.RUN_ID }}/artifacts/model" | head -n 1)

          echo "Model directory: $MODEL_DIR"

          if [ -z "$MODEL_DIR" ]; then
            echo "Model artifact not found"
            exit 1
          fi

          mkdir -p docker_model
          cp -r "$MODEL_DIR" docker_model/model

          cat > Dockerfile <<'EOF'
          FROM python:3.12-slim

          WORKDIR /app

          RUN pip install --no-cache-dir mlflow==2.19.0 scikit-learn pandas numpy matplotlib seaborn

          COPY docker_model/model /app/model

          EXPOSE 5000

          CMD ["mlflow", "models", "serve", "-m", "/app/model", "--host", "0.0.0.0", "--port", "5000", "--no-conda"]
          EOF

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-mlflow:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-mlflow:latest

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: MLProject/mlruns
